<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BySsal Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&display=swap');
  :root { --bg: #f7f3ef; --fg: #2e2a27; --accent: #8a6f55; --white: #fff; --dim: rgba(46,42,39,0.55); --subtle: rgba(46,42,39,0.12); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--fg); font-family: 'Noto Serif KR', serif; line-height: 1.8; }

  /* LOGIN */
  .login-screen {
    height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .login-screen h1 { font-size: 1.2rem; color: var(--accent); margin-bottom: 1.5rem; letter-spacing: 0.1em; }
  .login-screen input {
    padding: 0.8rem 1.2rem; width: 280px; border: 1px solid var(--subtle);
    font-family: inherit; font-size: 0.85rem; text-align: center; margin-bottom: 1rem;
  }
  .login-screen input:focus { outline: none; border-color: var(--accent); }
  .login-screen button {
    padding: 0.8rem 2.5rem; background: var(--accent); color: var(--white);
    border: none; font-family: inherit; font-size: 0.8rem; letter-spacing: 0.15em; cursor: pointer;
  }
  .login-screen button:hover { background: #a8917a; }
  .login-error { color: #c00; font-size: 0.75rem; margin-top: 0.5rem; display: none; }

  /* ADMIN PANEL */
  .admin-panel { display: none; max-width: 600px; margin: 0 auto; padding: 3rem 2rem; }
  .admin-panel.visible { display: block; }

  .admin-header { text-align: center; margin-bottom: 2.5rem; }
  .admin-header h1 { font-size: 1.3rem; color: var(--accent); letter-spacing: 0.1em; }
  .admin-header p { font-size: 0.75rem; color: var(--dim); margin-top: 0.3rem; }

  .section { margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 1px solid var(--subtle); }
  .section h2 { font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; }

  /* DATE CONTROLS */
  .date-add { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .date-add input { flex: 1; padding: 0.6rem; border: 1px solid var(--subtle); font-family: inherit; font-size: 0.85rem; }
  .date-add input:focus { outline: none; border-color: var(--accent); }
  .date-add button {
    padding: 0.6rem 1.2rem; background: var(--accent); color: var(--white);
    border: none; font-family: inherit; font-size: 0.8rem; cursor: pointer;
  }

  .blocked-list { list-style: none; }
  .blocked-list li {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--subtle);
    font-size: 0.85rem;
  }
  .blocked-list li .date-text { font-weight: 400; }
  .blocked-list li .remove-btn {
    background: none; border: none; color: #c00; cursor: pointer;
    font-size: 0.8rem; padding: 0.2rem 0.5rem;
  }
  .blocked-list li .remove-btn:hover { background: rgba(200,0,0,0.08); }
  .empty-msg { font-size: 0.8rem; color: var(--dim); font-style: italic; }

  /* NOTICE */
  .notice-input {
    width: 100%; padding: 0.7rem; border: 1px solid var(--subtle);
    font-family: inherit; font-size: 0.85rem; resize: vertical; min-height: 60px;
  }
  .notice-input:focus { outline: none; border-color: var(--accent); }

  /* SAVE */
  .save-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 1rem 2rem; background: var(--accent); text-align: center;
    display: none;
  }
  .save-bar.visible { display: block; }
  .save-bar button {
    padding: 0.7rem 3rem; background: var(--white); color: var(--accent);
    border: none; font-family: inherit; font-size: 0.85rem; letter-spacing: 0.15em;
    cursor: pointer; font-weight: 500;
  }
  .save-bar button:hover { background: #f0ece8; }
  .save-bar .save-status {
    color: var(--white); font-size: 0.75rem; margin-top: 0.3rem;
  }

  /* TOAST */
  .toast {
    position: fixed; top: 2rem; left: 50%; transform: translateX(-50%);
    padding: 0.7rem 2rem; background: #2e7d32; color: var(--white);
    font-size: 0.8rem; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 500px) {
    .admin-panel { padding: 2rem 1.2rem; }
    .date-add { flex-direction: column; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <h1>🌾 BySsal Admin</h1>
  <input type="password" id="admin-pw" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()">로그인</button>
  <div class="login-error" id="login-error">비밀번호가 틀렸습니다</div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="admin-panel">
  <div class="admin-header">
    <h1>🌾 BySsal Admin</h1>
    <p>주문 관리 패널</p>
  </div>

  <!-- BLOCKED DATES -->
  <div class="section">
    <h2>🔒 주문 차단 날짜</h2>
    <p style="font-size:0.75rem; color:var(--dim); margin-bottom:1rem;">
      주문이 많은 날 차단하면, 고객이 해당 날짜로 주문할 수 없습니다.
    </p>
    <div class="date-add">
      <input type="date" id="new-date">
      <button onclick="addDate()">+ 추가</button>
    </div>
    <ul class="blocked-list" id="blocked-list"></ul>
    <div class="empty-msg" id="empty-msg">차단된 날짜가 없습니다</div>
  </div>

  <!-- NOTICE -->
  <div class="section">
    <h2>📢 주문 페이지 공지</h2>
    <p style="font-size:0.75rem; color:var(--dim); margin-bottom:1rem;">
      주문 페이지 상단에 표시할 공지사항 (비우면 표시 안 됨)
    </p>
    <textarea class="notice-input" id="notice-input" placeholder="예: 설 연휴(1/27~1/30) 주문이 많아 배송이 지연될 수 있습니다."></textarea>
  </div>

  <!-- CURRENT STATUS -->
  <div class="section" style="border-bottom:none;">
    <h2>📊 현재 상태</h2>
    <div id="status-display" style="font-size:0.8rem; color:var(--dim);"></div>
  </div>
</div>

<!-- SAVE BAR -->
<div class="save-bar" id="save-bar">
  <button onclick="saveConfig()">💾 저장하기</button>
  <div class="save-status" id="save-status"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = 'https://jsonblob.com/api/jsonBlob/019ccbd9-9baa-7bd9-b9df-c4be1c19c0b2';
const ADMIN_PW_HASH = '8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918'; // "admin" sha256

let config = { blocked_dates: [], notice: '' };
let hasChanges = false;

async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function login() {
  const pw = document.getElementById('admin-pw').value;
  const hash = await sha256(pw);
  // Accept the set password hash
  const stored = localStorage.getItem('byssal_admin_hash') || ADMIN_PW_HASH;
  if (hash === stored || hash === ADMIN_PW_HASH) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-panel').classList.add('visible');
    document.getElementById('save-bar').classList.add('visible');
    loadConfig();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

async function loadConfig() {
  try {
    const res = await fetch(API_URL);
    config = await res.json();
    renderDates();
    document.getElementById('notice-input').value = config.notice || '';
    updateStatus();
  } catch(e) {
    showToast('⚠️ 설정을 불러올 수 없습니다', true);
  }
}

function renderDates() {
  const list = document.getElementById('blocked-list');
  const empty = document.getElementById('empty-msg');

  if (!config.blocked_dates || config.blocked_dates.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  config.blocked_dates.sort();
  list.innerHTML = config.blocked_dates.map(d => {
    const dateObj = new Date(d + 'T00:00:00');
    const weekday = ['일','월','화','수','목','금','토'][dateObj.getDay()];
    return `<li>
      <span class="date-text">📅 ${d} (${weekday})</span>
      <button class="remove-btn" onclick="removeDate('${d}')">✕ 해제</button>
    </li>`;
  }).join('');
}

function addDate() {
  const input = document.getElementById('new-date');
  const date = input.value;
  if (!date) return;
  if (!config.blocked_dates) config.blocked_dates = [];
  if (config.blocked_dates.includes(date)) {
    showToast('이미 차단된 날짜입니다');
    return;
  }
  config.blocked_dates.push(date);
  input.value = '';
  renderDates();
  markChanged();
}

function removeDate(date) {
  config.blocked_dates = config.blocked_dates.filter(d => d !== date);
  renderDates();
  markChanged();
}

function markChanged() {
  hasChanges = true;
  document.getElementById('save-status').textContent = '변경사항이 있습니다';
}

async function saveConfig() {
  config.notice = document.getElementById('notice-input').value.trim();
  try {
    await fetch(API_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(config)
    });
    hasChanges = false;
    document.getElementById('save-status').textContent = '';
    updateStatus();
    showToast('✅ 저장 완료! 주문 페이지에 즉시 반영됩니다.');
  } catch(e) {
    showToast('⚠️ 저장 실패. 다시 시도해주세요.', true);
  }
}

function updateStatus() {
  const el = document.getElementById('status-display');
  const cnt = config.blocked_dates ? config.blocked_dates.length : 0;
  const notice = config.notice ? '있음' : '없음';
  el.innerHTML = `차단된 날짜: <strong>${cnt}개</strong> · 공지사항: <strong>${notice}</strong>`;
}

function showToast(msg, isError) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.background = isError ? '#c00' : '#2e7d32';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Auto-login if password stored
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('admin-pw').focus();
});
</script>

</body>
</html>
