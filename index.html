<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>바이쌀 BYSSAL — 수제 쌀 디저트</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Noto+Serif+KR:wght@200;300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%; overflow: hidden;
    font-family: 'Cormorant Garamond', serif;
    background: #f7f3ef; color: #2e2a27;
  }

  /* ── Noise Texture ── */
  .noise {
    position: fixed; inset: 0;
    opacity: 0.03; pointer-events: none; z-index: 10;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px;
  }

  /* ── Marquee ── */
  .marquee-wrap {
    position: absolute;
    top: 15%;
    left: 0; width: 100%;
    overflow: hidden;
    pointer-events: none;
  }

  .marquee {
    display: flex;
    white-space: nowrap;
    animation: marquee 25s linear infinite;
  }

  .marquee span {
    font-size: clamp(4rem, 11vw, 9rem);
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(138,111,85,0.06);
    margin-right: 0.5em;
    font-family: 'Cormorant Garamond', serif;
  }

  @keyframes marquee {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* ── Main Layout ── */
  .gate {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── Product Image ── */
  .gate-product {
    position: relative;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 2s ease 0.3s forwards;
  }

  .gate-product img {
    height: clamp(160px, 30vh, 280px);
    width: clamp(160px, 30vh, 280px);
    object-fit: cover;
    border-radius: 50%;
    border: 1px solid rgba(138,111,85,0.15);
    box-shadow: 0 20px 80px rgba(138,111,85,0.12), 0 0 0 8px rgba(138,111,85,0.04);
  }

  .gate-product::after {
    content: '';
    position: absolute;
    bottom: -12px; left: 50%;
    transform: translateX(-50%);
    width: 50%;
    height: 1px;
    background: radial-gradient(ellipse, rgba(138,111,85,0.25), transparent 70%);
  }

  /* ── Logo ── */
  .gate-logo {
    margin-bottom: 0.8rem;
    opacity: 0;
    animation: fadeUp 2s ease 0.6s forwards;
  }

  .gate-logo img {
    height: clamp(50px, 8vw, 80px);
    filter: drop-shadow(0 2px 8px rgba(138,111,85,0.08));
  }

  /* ── Tagline ── */
  .gate-tagline {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(0.7rem, 1.5vw, 0.85rem);
    font-weight: 300;
    letter-spacing: 0.2em;
    color: rgba(138,111,85,0.6);
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 1.5s ease 0.9s forwards;
  }

  /* ── Prompt ── */
  .gate-prompt {
    font-size: 0.55rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(138,111,85,0.4);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 1.5s ease 1.2s forwards;
  }

  /* ── Button ── */
  .gate-buttons {
    display: flex;
    gap: 0.8rem;
    opacity: 0;
    animation: fadeUp 1.5s ease 1.5s forwards;
  }

  .gate-btn {
    display: inline-block;
    padding: 1rem 3.5rem;
    background: #8a6f55;
    border: none;
    color: #f7f3ef;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: all 0.4s ease;
  }

  .gate-btn:hover {
    background: #a8917a;
    box-shadow: 0 8px 40px rgba(138,111,85,0.2);
    transform: translateY(-1px);
  }

  /* ── Decorative Line ── */
  .gate-line {
    width: 40px;
    height: 1px;
    background: rgba(138,111,85,0.2);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 1.5s ease 1s forwards;
  }

  /* ── Bottom Text ── */
  .gate-bottom {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%);
    font-size: 0.45rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: rgba(138,111,85,0.2);
    opacity: 0;
    animation: fadeUp 1.5s ease 2s forwards;
    white-space: nowrap;
  }

  /* ── Rice grain decorations ── */
  .grain {
    position: fixed;
    width: 3px; height: 8px;
    background: rgba(138,111,85,0.06);
    border-radius: 50%;
    pointer-events: none;
  }
  .grain-1 { top: 12%; left: 8%; transform: rotate(25deg); }
  .grain-2 { top: 25%; right: 12%; transform: rotate(-15deg); }
  .grain-3 { bottom: 18%; left: 15%; transform: rotate(40deg); }
  .grain-4 { bottom: 30%; right: 8%; transform: rotate(-30deg); }
  .grain-5 { top: 40%; left: 5%; transform: rotate(10deg); }
  .grain-6 { top: 60%; right: 6%; transform: rotate(-45deg); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Mobile ── */
  @media (max-width: 500px) {
    .marquee span { font-size: 3.5rem; }
    .gate-product img { height: 150px; width: 150px; }
    .gate-btn { padding: 0.9rem 2.5rem; font-size: 0.65rem; }
    .gate-tagline { font-size: 0.65rem; letter-spacing: 0.15em; }
  }
</style>
</head>
<body>

<div class="noise"></div>

<!-- Subtle grain decorations -->
<div class="grain grain-1"></div>
<div class="grain grain-2"></div>
<div class="grain grain-3"></div>
<div class="grain grain-4"></div>
<div class="grain grain-5"></div>
<div class="grain grain-6"></div>

<!-- Marquee -->
<div class="marquee-wrap">
  <div class="marquee">
    <span>BySsal</span><span>BySsal</span><span>BySsal</span><span>BySsal</span>
    <span>BySsal</span><span>BySsal</span><span>BySsal</span><span>BySsal</span>
    <span>BySsal</span><span>BySsal</span><span>BySsal</span><span>BySsal</span>
    <span>BySsal</span><span>BySsal</span><span>BySsal</span><span>BySsal</span>
  </div>
</div>

<!-- Gate -->
<div class="gate">
  <div class="gate-product">
    <img src="assets/img/rice-cake-flower.jpg" alt="BySsal 앙금떡케이크">
  </div>

  <div class="gate-logo">
    <img src="assets/img/byssal-logo.png" alt="BySsal">
  </div>

  <div class="gate-tagline">한 입의 여유</div>

  <div class="gate-line"></div>

  <div class="gate-prompt">Select Language</div>

  <div class="gate-buttons">
    <a href="main.html" class="gate-btn">한국어</a>
    <a href="en/" class="gate-btn">English</a>
  </div>
</div>

<div class="gate-bottom">Rice Dessert & Cake · Songdo, Incheon · Est. MMXXV</div>

</body>
</html>
